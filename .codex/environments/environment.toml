# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "fmplay"

[setup]
script = '''
set -eu

common_dir=$(git rev-parse --path-format=absolute --git-common-dir)
source_root=$(dirname "$common_dir")
target_root=$(pwd)

link_or_copy_file() {
  source_file=$1
  target_file=$2

  if [ ! -f "$source_file" ]; then
    return 0
  fi

  target_dir=$(dirname "$target_file")
  mkdir -p "$target_dir"

  if [ -e "$target_file" ]; then
    if [ "$source_file" -ef "$target_file" ]; then
      return 0
    fi
    rm -f "$target_file"
  fi

  ln "$source_file" "$target_file" 2>/dev/null || cp -p "$source_file" "$target_file"
}

if [ "$source_root" != "$target_root" ]; then
  link_or_copy_file "$source_root/.env" "$target_root/.env"

  if [ -d "$source_root/clips/audio" ]; then
    find "$source_root/clips/audio" -type f ! -name '.gitkeep' -print | while IFS= read -r source_file; do
      relative_path=${source_file#"$source_root/"}
      link_or_copy_file "$source_file" "$target_root/$relative_path"
    done
  fi
fi

uv sync
'''
